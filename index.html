<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITNODE HFT PRO | STORM-X v5.0</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff00c8;
            --success: #00ffa3;
            --danger: #ff3366;
            --bg: #020204;
            --panel: rgba(13, 14, 20, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        .app-grid {
            max-width: 1600px; margin: 0 auto; padding: 2rem;
            display: grid; grid-template-columns: 320px 1fr 340px; gap: 1.5rem;
        }

        .panel {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 20px; padding: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .badge {
            padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 900;
            text-transform: uppercase;
        }
        .badge.success { background: rgba(0, 255, 163, 0.1); color: var(--success); }
        .badge.danger { background: rgba(255, 51, 102, 0.1); color: var(--danger); }

        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .live-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; margin-right: 8px; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ASSETS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'XRPUSDT', 'BNBUSDT', 'DOGEUSDT', 'LINKUSDT'];

        const Dashboard = () => {
            const [prices, setPrices] = useState({});
            const [activeAsset, setActiveAsset] = useState('BTCUSDT');
            const [trades, setTrades] = useState([]);
            const [stats, setStats] = useState({ dailyPnL: 0, winRate: 0 });
            const ws = useRef(null);

            useEffect(() => {
                // Initialize WebSocket for real market data
                const stream = ASSETS.map(a => a.toLowerCase() + '@ticker').join('/');
                ws.current = new WebSocket(`wss://fstream.binance.com/ws/${stream}`);

                ws.current.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    setPrices(prev => ({
                        ...prev,
                        [data.s]: parseFloat(data.c)
                    }));
                };

                return () => ws.current?.close();
            }, []);

            // Simulate/Fetch bot status from daily_report.json
            useEffect(() => {
                const fetchReport = async () => {
                    try {
                        const res = await fetch('bitnode-v4/daily_report.json');
                        const data = await res.json();
                        setTrades(data.trades || []);
                        setStats({
                            dailyPnL: data.dailyPnL || 0,
                            winRate: data.trades?.length ? ((data.trades.filter(t => t.status === 'WON').length / data.trades.length) * 100).toFixed(1) : 0
                        });
                    } catch (e) {
                        // Silent fail if file not found yet
                    }
                };
                const interval = setInterval(fetchReport, 5000);
                return () => clearInterval(interval);
            }, []);

            const currentPrice = prices[activeAsset] || 0;

            return (
                <div className="app-grid">
                    {/* Header */}
                    <header style={{ gridColumn: '1/-1', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                        <div>
                            <h1 className="gradient-text" style={{ fontSize: '2.2rem' }}>BITNODE HFT <span style={{ color: 'white', fontWeight: 300 }}>v5.0</span></h1>
                            <div style={{ display: 'flex', alignItems: 'center' }}>
                                <span className="live-dot"></span>
                                <span className="mono" style={{ fontSize: '0.7rem', color: 'var(--primary)' }}>REAL-TIME BINANCE FUTURES DATA CONNECTED</span>
                            </div>
                        </div>
                        <div className="panel" style={{ padding: '0.8rem 1.5rem', display: 'flex', gap: '2rem' }}>
                            <div><div className="stat-label">Daily PnL</div><div className="mono" style={{ color: stats.dailyPnL >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: 800 }}>${stats.dailyPnL.toFixed(2)}</div></div>
                            <div><div className="stat-label">Win Rate</div><div className="mono" style={{ fontWeight: 800 }}>{stats.winRate}%</div></div>
                        </div>
                    </header>

                    {/* Sidebar */}
                    <aside>
                        <div className="panel">
                            <h3 className="stat-label">Market Watch</h3>
                            {ASSETS.map(a => (
                                <div key={a} 
                                     onClick={() => setActiveAsset(a)}
                                     style={{ 
                                         padding: '10px', borderRadius: '10px', marginBottom: '5px', cursor: 'pointer',
                                         background: activeAsset === a ? 'rgba(0, 242, 255, 0.1)' : 'transparent',
                                         display: 'flex', justifyContent: 'space-between'
                                     }}>
                                    <span style={{ fontWeight: 800 }}>{a.replace('USDT', '')}</span>
                                    <span className="mono">${prices[a]?.toFixed(2) || '---'}</span>
                                </div>
                            ))}
                        </div>
                    </aside>

                    {/* Main Chart/Trade Area */}
                    <main>
                        <div className="panel" style={{ minHeight: '400px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '2rem' }}>
                                <div>
                                    <h2 style={{ fontSize: '2rem' }}>{activeAsset}</h2>
                                    <div className="stat-value mono" style={{ color: 'var(--primary)' }}>${currentPrice.toFixed(2)}</div>
                                </div>
                                <div style={{ textAlign: 'right' }}>
                                    <div className="badge success">BOT: SCANNING</div>
                                    <div style={{ marginTop: '5px', fontSize: '0.8rem', color: 'var(--text-dim)' }}>Leverage: 50x</div>
                                </div>
                            </div>

                            <h3 className="stat-label">Execution Log</h3>
                            <div style={{ marginTop: '1rem' }}>
                                {trades.length === 0 ? (
                                    <div style={{ padding: '3rem', textAlign: 'center', border: '1px dashed var(--border)', borderRadius: '15px', color: 'var(--text-dim)' }}>
                                        Awaiting first trade from Headless Engine...
                                    </div>
                                ) : (
                                    trades.slice(-5).reverse().map(t => (
                                        <div key={t.id} style={{ 
                                            padding: '15px', background: 'rgba(255,255,255,0.02)', borderRadius: '12px', marginBottom: '10px',
                                            borderLeft: `4px solid ${t.status === 'WON' ? 'var(--success)' : 'var(--danger)'}`
                                        }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                                <span style={{ fontWeight: 800 }}>{t.symbol} {t.direction}</span>
                                                <span style={{ color: t.status === 'WON' ? 'var(--success)' : 'var(--danger)', fontWeight: 800 }}>
                                                    {t.status} (${t.profit.toFixed(2)})
                                                </span>
                                            </div>
                                            <div className="mono" style={{ fontSize: '0.8rem', color: 'var(--text-dim)', marginTop: '5px' }}>
                                                Entry: {t.entry} | Exit: {t.exit} | {new Date(t.startTime).toLocaleTimeString()}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Right Column */}
                    <aside>
                        <div className="panel">
                            <h3 className="stat-label">Strategy Status</h3>
                            <div style={{ fontSize: '0.9rem', lineHeight: '1.8' }}>
                                <div><span style={{ color: 'var(--primary)' }}>[SMC]</span> FVG Check: <span style={{ color: 'var(--success)' }}>PASS</span></div>
                                <div><span style={{ color: 'var(--primary)' }}>[SMC]</span> Order Block: <span style={{ color: 'var(--success)' }}>PASS</span></div>
                                <div><span style={{ color: 'var(--primary)' }}>[VOL]</span> Liquidity: <span style={{ color: 'var(--success)' }}>HIGH</span></div>
                                <div><span style={{ color: 'var(--primary)' }}>[HFT]</span> Latency: <span style={{ color: 'var(--success)' }}>1.2ms</span></div>
                            </div>
                            <div style={{ marginTop: '2rem', padding: '15px', background: 'rgba(255,0,200,0.05)', border: '1px solid var(--accent)', borderRadius: '12px' }}>
                                <div style={{ fontSize: '0.7rem', color: var(--accent), fontWeight: 800 }}>PRO MODE ACTIVE</div>
                                <div style={{ fontSize: '0.8rem', marginTop: '5px' }}>Trading with 50x leverage on Binance Futures Testnet.</div>
                            </div>
                        </div>
                    </aside>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
