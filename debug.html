<!DOCTYPE html>

<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  document.body.innerHTML = '<div style="color:red; font-size: 20px; padding: 20px;">ERROR: ' + msg + '<br>Line: ' + lineNo + '<br>Col: ' + columnNo + '<br>' + (error && error.stack) + '</div>';
  return false;
};
window.addEventListener('unhandledrejection', function(event) {
  document.body.innerHTML = '<div style="color:red; font-size: 20px; padding: 20px;">PROMISE ERROR: ' + event.reason + '</div>';
});
</script>
