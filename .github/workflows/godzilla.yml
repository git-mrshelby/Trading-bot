name: Godzilla HFT Automation

on:
  schedule:
    - cron: '0 * * * *' # Run every hour (Headless Mode)
  workflow_dispatch:    # This allows you to run it manually!

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Godzilla Headless
        run: node bot-headless.js
        timeout-minutes: 55

      - name: Upload Daily Report
        uses: actions/upload-artifact@v4
        with:
          name: godzilla-hourly-report
          path: daily_report.json
