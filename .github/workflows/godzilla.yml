name: Godzilla HFT Automation

on:
  schedule:
    - cron: '0 0 * * *' # Run automatically ONCE a day at midnight
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if [ -d "bitnode-v4" ]; then cd bitnode-v4; fi
          npm install axios pdfkit

      - name: Run Godzilla Headless Engine
        run: |
          if [ -d "bitnode-v4" ]; then cd bitnode-v4; fi
          node bot-headless.js
        timeout-minutes: 340 # Allow up to 6 hours for real market moves

      - name: Upload Daily Profit Report
        uses: actions/upload-artifact@v4
        with:
          name: godzilla-daily-report
          path: |
            daily_report.json
            daily_report.pdf
            bitnode-v4/daily_report.json
            bitnode-v4/daily_report.pdf
          if-no-files-found: ignore
